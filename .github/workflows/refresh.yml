name: Refresh research data

on:
  schedule:
    - cron: "15 9 * * 1-5"
    - cron: "45 9 * * 1-5"
    - cron: "30 11 * * 1-5"
  workflow_dispatch:
    inputs:
      backfill_start_date:
        description: Optional YYYY-MM-DD historical rewrite boundary
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: fearngreed-pages
  cancel-in-progress: false

jobs:
  refresh:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: uv sync --locked
      - name: Refresh derived data
        id: refresh
        shell: bash
        env:
          BACKFILL_START_DATE: ${{ inputs.backfill_start_date }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
        run: |
          missing_secrets=()
          [[ -n "$KRX_API_KEY" ]] || missing_secrets+=(KRX_API_KEY)
          [[ -n "$KRX_ID" ]] || missing_secrets+=(KRX_ID)
          [[ -n "$KRX_PW" ]] || missing_secrets+=(KRX_PW)
          if (( ${#missing_secrets[@]} )); then
            printf -v missing_names '%s, ' "${missing_secrets[@]}"
            echo "::error title=Missing required Actions secrets::Missing required secret names: ${missing_names%, }"
            exit 1
          fi

          target_date="$(TZ=Asia/Seoul date +%F)"
          args=(--date "$target_date")
          if [[ -n "$BACKFILL_START_DATE" ]]; then
            [[ "$BACKFILL_START_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]
            args+=(--backfill-start-date "$BACKFILL_START_DATE")
          else
            args+=(--skip-if-current)
          fi
          failure_policy=publish
          if [[ "$EVENT_NAME" == "schedule" && "$EVENT_SCHEDULE" != "30 11 * * 1-5" ]]; then
            failure_policy=preserve
            args+=(--require-end-session)
          fi
          args+=(--failure-policy "$failure_policy")
          umask 077
          refresh_receipt_file="$RUNNER_TEMP/fearngreed-refresh-receipt.json"
          set +e
          uv run --frozen python -m fearngreed.refresh "${args[@]}" > "$refresh_receipt_file"
          refresh_status=$?
          set -e
          # Run while exact credential values are still scoped to this step.
          # The scanner reports paths only and never prints the values.
          uv run --frozen python -c "from pathlib import Path; from fearngreed.security import scan_public_files; assert not scan_public_files(Path('.'))"
          if [[ $refresh_status -eq 0 ]]; then
            data_as_of="$(uv run --frozen python -c "import datetime as dt, json, sys; from pathlib import Path; receipt=json.loads(Path(sys.argv[1]).read_text(encoding='utf-8')); assert receipt.get('ok') is True; value=receipt['expectedDataAsOf']; dt.date.fromisoformat(value); print(value)" "$refresh_receipt_file")"
            skipped="$(uv run --frozen python -c "import json, sys; from pathlib import Path; receipt=json.loads(Path(sys.argv[1]).read_text(encoding='utf-8')); print('true' if receipt.get('skipped') is True else 'false')" "$refresh_receipt_file")"
            cat "$refresh_receipt_file"
            if [[ "$skipped" == "true" ]]; then
              echo "outcome=skipped" >> "$GITHUB_OUTPUT"
            else
              echo "outcome=success" >> "$GITHUB_OUTPUT"
            fi
            echo "dataAsOf=$data_as_of" >> "$GITHUB_OUTPUT"
          else
            cat "$refresh_receipt_file"
            if [[ "$failure_policy" == "preserve" ]]; then
              echo "outcome=retry_pending" >> "$GITHUB_OUTPUT"
            else
              echo "outcome=failure" >> "$GITHUB_OUTPUT"
            fi
          fi
      - name: Enforce early-retry preservation boundary
        if: steps.refresh.outputs.outcome == 'retry_pending'
        run: git diff --quiet -- data
      - name: Enforce failed-refresh mutation boundary
        if: steps.refresh.outputs.outcome == 'failure'
        shell: bash
        run: |
          unexpected=0
          while IFS= read -r path; do
            case "$path" in
              data/summary.json|data/automation-status.json) ;;
              *)
                echo "Unexpected failed-refresh mutation: $path"
                unexpected=1
                ;;
            esac
          done < <(git diff --name-only -- data)
          [[ $unexpected -eq 0 ]]
      - if: steps.refresh.outputs.outcome == 'success' || steps.refresh.outputs.outcome == 'failure'
        run: uv run --frozen pytest
      - if: steps.refresh.outputs.outcome == 'success' || steps.refresh.outputs.outcome == 'failure'
        run: uv run --frozen ruff check .
      - if: steps.refresh.outputs.outcome == 'success' || steps.refresh.outputs.outcome == 'failure'
        run: uv run --frozen ruff format --check .
      - if: steps.refresh.outputs.outcome == 'success' || steps.refresh.outputs.outcome == 'failure'
        run: npm test
      - name: Verify local derivatives
        if: steps.refresh.outputs.outcome == 'success' || steps.refresh.outputs.outcome == 'failure'
        shell: bash
        env:
          EXPECTED_DATA_AS_OF: ${{ steps.refresh.outputs.dataAsOf }}
        run: |
          verify_args=()
          if [[ "${{ steps.refresh.outputs.outcome }}" == "success" ]]; then
            verify_args+=(--expected-data-as-of "$EXPECTED_DATA_AS_OF")
          fi
          uv run --frozen python -m fearngreed.verify "${verify_args[@]}"
      - if: steps.refresh.outputs.outcome == 'success' || steps.refresh.outputs.outcome == 'failure'
        run: uv run --frozen python -m fearngreed.site --output dist
      - if: steps.refresh.outputs.outcome == 'success' || steps.refresh.outputs.outcome == 'failure'
        run: uv run --frozen python -c "from pathlib import Path; from fearngreed.security import scan_public_files; assert not scan_public_files(Path('.'))"
      - name: Commit validated derivatives
        if: steps.refresh.outputs.outcome == 'success' || steps.refresh.outputs.outcome == 'failure'
        shell: bash
        run: |
          if git diff --quiet -- data; then
            echo "No derived-data changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ "${{ steps.refresh.outputs.outcome }}" == "failure" ]]; then
            git add data/summary.json data/automation-status.json
            commit_message="data: publish degraded refresh status"
          else
            git add data
            commit_message="data: refresh fear and greed derivatives"
          fi
          git diff --cached --check
          git fetch origin main
          if [[ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]]; then
            echo "Remote main changed during refresh; a later retry must recompute from the new head."
            exit 1
          fi
          git commit -m "$commit_message"
          git push origin HEAD:main
      # A push made with GITHUB_TOKEN does not trigger the separate Pages
      # workflow. Deploy the validated working tree here so success and
      # degraded status commits both reach the public contract.
      - if: steps.refresh.outputs.outcome == 'success' || steps.refresh.outputs.outcome == 'failure'
        uses: actions/configure-pages@v5
      - if: steps.refresh.outputs.outcome == 'success' || steps.refresh.outputs.outcome == 'failure'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - name: Deploy validated derivatives
        if: steps.refresh.outputs.outcome == 'success' || steps.refresh.outputs.outcome == 'failure'
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Verify live public derivative hashes
        if: steps.refresh.outputs.outcome == 'success' || steps.refresh.outputs.outcome == 'failure'
        shell: bash
        env:
          EXPECTED_DATA_AS_OF: ${{ steps.refresh.outputs.dataAsOf }}
        run: |
          verify_args=(--base-url "${{ steps.deployment.outputs.page_url }}")
          if [[ "${{ steps.refresh.outputs.outcome }}" == "success" ]]; then
            verify_args+=(--expected-data-as-of "$EXPECTED_DATA_AS_OF")
          fi
          for attempt in {1..12}; do
            if uv run --frozen python -m fearngreed.verify "${verify_args[@]}"; then
              exit 0
            fi
            if [[ $attempt -eq 12 ]]; then
              exit 1
            fi
            sleep 5
          done
      - name: Report provider refresh failure
        if: steps.refresh.outputs.outcome == 'failure'
        run: |
          echo "The last known-good market outputs were preserved and degraded status was published."
          exit 1
      - name: Report early retry pending
        if: steps.refresh.outputs.outcome == 'retry_pending'
        run: echo "Today's official session is not ready yet; the next scheduled attempt will retry without publishing changes."
      - name: Report already-current session
        if: steps.refresh.outputs.outcome == 'skipped'
        run: echo "Today's official session is already published; no files, commit, or deployment were created."
