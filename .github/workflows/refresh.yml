name: Refresh research data

on:
  schedule:
    - cron: "15 9 * * 1-5"
    - cron: "45 9 * * 1-5"
    - cron: "30 11 * * 1-5"
  workflow_dispatch:
    inputs:
      provider_probe_date:
        description: Optional YYYY-MM-DD confirmed session for a no-write provider credential probe
        required: false
        type: string
      backfill_start_date:
        description: Optional YYYY-MM-DD historical rewrite boundary
        required: false
        type: string
      official_data_date:
        description: Optional completed past KRX session YYYY-MM-DD for a manual exact-date refresh
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: fearngreed-pages
  cancel-in-progress: false

jobs:
  refresh:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: uv sync --locked
      - name: Refresh derived data
        id: refresh
        shell: bash
        env:
          PROVIDER_PROBE_DATE: ${{ inputs.provider_probe_date }}
          BACKFILL_START_DATE: ${{ inputs.backfill_start_date }}
          OFFICIAL_DATA_DATE: ${{ inputs.official_data_date }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
        run: |
          missing_secrets=()
          [[ -n "$KRX_API_KEY" ]] || missing_secrets+=(KRX_API_KEY)
          [[ -n "$KRX_ID" ]] || missing_secrets+=(KRX_ID)
          [[ -n "$KRX_PW" ]] || missing_secrets+=(KRX_PW)
          if (( ${#missing_secrets[@]} )); then
            printf -v missing_names '%s, ' "${missing_secrets[@]}"
            echo "::error title=Missing required Actions secrets::Missing required secret names: ${missing_names%, }"
            exit 1
          fi

          if [[ -n "$PROVIDER_PROBE_DATE" ]]; then
            [[ "$EVENT_NAME" == "workflow_dispatch" ]]
            [[ "$PROVIDER_PROBE_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]
            [[ -z "$BACKFILL_START_DATE" ]]
            [[ -z "$OFFICIAL_DATA_DATE" ]]
            umask 077
            probe_receipt_file="$RUNNER_TEMP/fearngreed-provider-probe-receipt.json"
            set +e
            timeout --signal=TERM --kill-after=30s 12m uv run --frozen python -m fearngreed.refresh \
              --probe --date "$PROVIDER_PROBE_DATE" > "$probe_receipt_file"
            probe_status=$?
            set -e
            uv run --frozen python -c "from pathlib import Path; from fearngreed.security import scan_public_files; assert not scan_public_files(Path('.'))"
            cat "$probe_receipt_file"
            [[ $probe_status -eq 0 ]]
            echo "outcome=probe_success" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          current_kst_date="$(TZ=Asia/Seoul date +%F)"
          if [[ -n "$OFFICIAL_DATA_DATE" ]]; then
            [[ "$EVENT_NAME" == "workflow_dispatch" ]]
            [[ "$OFFICIAL_DATA_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]
            [[ "$OFFICIAL_DATA_DATE" < "$current_kst_date" ]]
          fi

          if [[ "$EVENT_NAME" == "workflow_dispatch" && -z "$BACKFILL_START_DATE" && -z "$OFFICIAL_DATA_DATE" ]]; then
            current_kst_time="$(TZ=Asia/Seoul date +%H%M)"
            if (( 10#$current_kst_time < 1815 )); then
              echo "outcome=retry_pending" >> "$GITHUB_OUTPUT"
              echo "::notice title=Official refresh deferred::Manual final-data refresh is available from 18:15 KST."
              exit 0
            fi
          fi

          target_date="${OFFICIAL_DATA_DATE:-$current_kst_date}"
          args=(--date "$target_date")
          if [[ -n "$BACKFILL_START_DATE" ]]; then
            [[ "$BACKFILL_START_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]
            args+=(--backfill-start-date "$BACKFILL_START_DATE")
          elif [[ -z "$OFFICIAL_DATA_DATE" ]]; then
            # Scheduled/default manual runs may no-op when the confirmed
            # session is already published.  An explicit official date is a
            # force-refresh control used to revalidate the complete
            # incremental provider -> analysis -> deployment path.
            args+=(--skip-if-current)
          fi
          if [[ -n "$OFFICIAL_DATA_DATE" ]]; then
            args+=(--require-end-session)
          fi
          failure_policy=publish
          if [[ "$EVENT_NAME" == "schedule" && "$EVENT_SCHEDULE" != "30 11 * * 1-5" ]]; then
            failure_policy=preserve
            args+=(--require-end-session)
          fi
          args+=(--failure-policy "$failure_policy")
          umask 077
          refresh_receipt_file="$RUNNER_TEMP/fearngreed-refresh-receipt.json"
          set +e
          timeout --signal=TERM --kill-after=30s 35m uv run --frozen python -m fearngreed.refresh "${args[@]}" > "$refresh_receipt_file"
          refresh_status=$?
          set -e
          if [[ $refresh_status -eq 124 && "$failure_policy" == "publish" ]]; then
            uv run --frozen python -c "from fearngreed.refresh import mark_failed; mark_failed('refresh_timeout')"
          fi
          # Run while exact credential values are still scoped to this step.
          # The scanner reports paths only and never prints the values.
          uv run --frozen python -c "from pathlib import Path; from fearngreed.security import scan_public_files; assert not scan_public_files(Path('.'))"
          if [[ $refresh_status -eq 0 ]]; then
            data_as_of="$(uv run --frozen python -c "import datetime as dt, json, sys; from pathlib import Path; receipt=json.loads(Path(sys.argv[1]).read_text(encoding='utf-8')); assert receipt.get('ok') is True; value=receipt['expectedDataAsOf']; dt.date.fromisoformat(value); print(value)" "$refresh_receipt_file")"
            skipped="$(uv run --frozen python -c "import json, sys; from pathlib import Path; receipt=json.loads(Path(sys.argv[1]).read_text(encoding='utf-8')); print('true' if receipt.get('skipped') is True else 'false')" "$refresh_receipt_file")"
            cat "$refresh_receipt_file"
            if [[ "$skipped" == "true" ]]; then
              echo "outcome=skipped" >> "$GITHUB_OUTPUT"
            else
              echo "outcome=success" >> "$GITHUB_OUTPUT"
            fi
            echo "dataAsOf=$data_as_of" >> "$GITHUB_OUTPUT"
          else
            cat "$refresh_receipt_file"
            if [[ "$failure_policy" == "preserve" ]]; then
              echo "outcome=retry_pending" >> "$GITHUB_OUTPUT"
            else
              echo "outcome=failure" >> "$GITHUB_OUTPUT"
            fi
          fi
      - name: Enforce early-retry preservation boundary
        if: steps.refresh.outputs.outcome == 'retry_pending'
        run: git diff --quiet -- data
      - name: Enforce provider probe no-write boundary
        if: steps.refresh.outputs.outcome == 'probe_success'
        shell: bash
        run: |
          [[ -z "$(git status --porcelain --untracked-files=all)" ]]
      - name: Enforce failed-refresh mutation boundary
        if: steps.refresh.outputs.outcome == 'failure'
        shell: bash
        run: |
          unexpected=0
          while IFS= read -r path; do
            case "$path" in
              data/summary.json|data/automation-status.json) ;;
              *)
                echo "Unexpected failed-refresh mutation: $path"
                unexpected=1
                ;;
            esac
          done < <(git diff --name-only -- data)
          [[ $unexpected -eq 0 ]]
      - if: steps.refresh.outputs.outcome == 'success' || steps.refresh.outputs.outcome == 'failure'
        run: timeout --signal=TERM --kill-after=30s 15m uv run --frozen pytest
      - if: steps.refresh.outputs.outcome == 'success' || steps.refresh.outputs.outcome == 'failure'
        run: timeout --signal=TERM --kill-after=30s 5m uv run --frozen ruff check .
      - if: steps.refresh.outputs.outcome == 'success' || steps.refresh.outputs.outcome == 'failure'
        run: timeout --signal=TERM --kill-after=30s 5m uv run --frozen ruff format --check .
      - if: steps.refresh.outputs.outcome == 'success' || steps.refresh.outputs.outcome == 'failure'
        run: timeout --signal=TERM --kill-after=30s 10m npm test
      - name: Verify local derivatives
        if: steps.refresh.outputs.outcome == 'success' || steps.refresh.outputs.outcome == 'failure'
        shell: bash
        env:
          EXPECTED_DATA_AS_OF: ${{ steps.refresh.outputs.dataAsOf }}
        run: |
          verify_args=()
          if [[ "${{ steps.refresh.outputs.outcome }}" == "success" ]]; then
            verify_args+=(--expected-data-as-of "$EXPECTED_DATA_AS_OF")
          fi
          timeout --signal=TERM --kill-after=30s 5m uv run --frozen python -m fearngreed.verify "${verify_args[@]}"
      - if: steps.refresh.outputs.outcome == 'success' || steps.refresh.outputs.outcome == 'failure'
        run: timeout --signal=TERM --kill-after=30s 5m uv run --frozen python -m fearngreed.site --output dist
      - if: steps.refresh.outputs.outcome == 'success' || steps.refresh.outputs.outcome == 'failure'
        run: uv run --frozen python -c "from pathlib import Path; from fearngreed.security import scan_public_files; assert not scan_public_files(Path('.'))"
      - name: Commit validated derivatives
        if: steps.refresh.outputs.outcome == 'success' || steps.refresh.outputs.outcome == 'failure'
        shell: bash
        run: |
          if git diff --quiet -- data; then
            echo "No derived-data changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ "${{ steps.refresh.outputs.outcome }}" == "failure" ]]; then
            git add data/summary.json data/automation-status.json
            commit_message="data: publish degraded refresh status"
          else
            git add data
            commit_message="data: refresh fear and greed derivatives"
          fi
          git diff --cached --check
          git fetch origin main
          if [[ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]]; then
            echo "Remote main changed during refresh; a later retry must recompute from the new head."
            exit 1
          fi
          git commit -m "$commit_message"
          git push origin HEAD:main
      # A push made with GITHUB_TOKEN does not trigger the separate Pages
      # workflow. Deploy the validated working tree here so success and
      # degraded status commits both reach the public contract.
      - if: steps.refresh.outputs.outcome == 'success' || steps.refresh.outputs.outcome == 'failure'
        uses: actions/configure-pages@v5
      - if: steps.refresh.outputs.outcome == 'success' || steps.refresh.outputs.outcome == 'failure'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - name: Deploy validated derivatives
        if: steps.refresh.outputs.outcome == 'success' || steps.refresh.outputs.outcome == 'failure'
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Verify live public derivative hashes
        if: steps.refresh.outputs.outcome == 'success' || steps.refresh.outputs.outcome == 'failure'
        shell: bash
        env:
          EXPECTED_DATA_AS_OF: ${{ steps.refresh.outputs.dataAsOf }}
        run: |
          verify_args=(--base-url "${{ steps.deployment.outputs.page_url }}")
          if [[ "${{ steps.refresh.outputs.outcome }}" == "success" ]]; then
            verify_args+=(--expected-data-as-of "$EXPECTED_DATA_AS_OF")
          fi
          for attempt in {1..12}; do
            if uv run --frozen python -m fearngreed.verify "${verify_args[@]}"; then
              exit 0
            fi
            if [[ $attempt -eq 12 ]]; then
              exit 1
            fi
            sleep 5
          done
      - name: Report provider refresh failure
        if: steps.refresh.outputs.outcome == 'failure'
        run: |
          echo "The last known-good market outputs were preserved and degraded status was published."
          exit 1
      - name: Report early retry pending
        if: steps.refresh.outputs.outcome == 'retry_pending'
        run: echo "Today's official session is not ready or its final-data window has not opened; a later attempt will retry without publishing changes."
      - name: Report already-current session
        if: steps.refresh.outputs.outcome == 'skipped'
        run: echo "Today's official session is already published; no files, commit, or deployment were created."
      - name: Report provider credential probe
        if: steps.refresh.outputs.outcome == 'probe_success'
        run: echo "KRX Open API and authenticated pykrx provider checks passed without changing public data."
