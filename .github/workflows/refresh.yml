name: Refresh research data

on:
  schedule:
    - cron: "30 11 * * 1-5"
  workflow_dispatch:
    inputs:
      backfill_start_date:
        description: Optional YYYY-MM-DD historical rewrite boundary
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: fearngreed-pages
  cancel-in-progress: false

jobs:
  refresh:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: uv sync --locked
      - name: Refresh derived data
        id: refresh
        shell: bash
        env:
          BACKFILL_START_DATE: ${{ inputs.backfill_start_date }}
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
        run: |
          args=()
          if [[ -n "$BACKFILL_START_DATE" ]]; then
            [[ "$BACKFILL_START_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]
            args+=(--backfill-start-date "$BACKFILL_START_DATE")
          fi
          set +e
          uv run --frozen python -m fearngreed.refresh "${args[@]}"
          refresh_status=$?
          set -e
          # Run while exact credential values are still scoped to this step.
          # The scanner reports paths only and never prints the values.
          uv run --frozen python -c "from pathlib import Path; from fearngreed.security import scan_public_files; assert not scan_public_files(Path('.'))"
          if [[ $refresh_status -eq 0 ]]; then
            echo "outcome=success" >> "$GITHUB_OUTPUT"
          else
            echo "outcome=failure" >> "$GITHUB_OUTPUT"
          fi
      - name: Enforce failed-refresh mutation boundary
        if: steps.refresh.outputs.outcome == 'failure'
        shell: bash
        run: |
          unexpected=0
          while IFS= read -r path; do
            case "$path" in
              data/summary.json|data/automation-status.json) ;;
              *)
                echo "Unexpected failed-refresh mutation: $path"
                unexpected=1
                ;;
            esac
          done < <(git diff --name-only -- data)
          [[ $unexpected -eq 0 ]]
      - run: uv run --frozen pytest
      - run: uv run --frozen ruff check .
      - run: uv run --frozen ruff format --check .
      - run: npm test
      - run: uv run --frozen python -m fearngreed.verify
      - run: uv run --frozen python -m fearngreed.site --output dist
      - run: uv run --frozen python -c "from pathlib import Path; from fearngreed.security import scan_public_files; assert not scan_public_files(Path('.'))"
      - name: Commit validated derivatives
        shell: bash
        run: |
          if git diff --quiet -- data; then
            echo "No derived-data changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ "${{ steps.refresh.outputs.outcome }}" == "failure" ]]; then
            git add data/summary.json data/automation-status.json
            commit_message="data: publish degraded refresh status"
          else
            git add data
            commit_message="data: refresh fear and greed derivatives"
          fi
          git diff --cached --check
          git commit -m "$commit_message"
          git push
      # A push made with GITHUB_TOKEN does not trigger the separate Pages
      # workflow. Deploy the validated working tree here so success and
      # degraded status commits both reach the public contract.
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - name: Deploy validated derivatives
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Verify live public derivative hashes
        shell: bash
        run: |
          for attempt in {1..12}; do
            if uv run --frozen python -m fearngreed.verify --base-url "${{ steps.deployment.outputs.page_url }}"; then
              exit 0
            fi
            if [[ $attempt -eq 12 ]]; then
              exit 1
            fi
            sleep 5
          done
      - name: Report provider refresh failure
        if: steps.refresh.outputs.outcome == 'failure'
        run: |
          echo "The last known-good market outputs were preserved and degraded status was published."
          exit 1
