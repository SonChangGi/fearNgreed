name: Refresh research data

on:
  schedule:
    - cron: "30 11 * * 1-5"
  workflow_dispatch:
    inputs:
      backfill_start_date:
        description: Optional YYYY-MM-DD historical rewrite boundary
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: fearngreed-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
      KRX_ID: ${{ secrets.KRX_ID }}
      KRX_PW: ${{ secrets.KRX_PW }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: uv sync --locked
      - name: Refresh derived data
        shell: bash
        env:
          BACKFILL_START_DATE: ${{ inputs.backfill_start_date }}
        run: |
          args=()
          if [[ -n "$BACKFILL_START_DATE" ]]; then
            [[ "$BACKFILL_START_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]
            args+=(--backfill-start-date "$BACKFILL_START_DATE")
          fi
          uv run --frozen python -m fearngreed.refresh "${args[@]}"
      - run: uv run --frozen pytest
      - run: uv run --frozen ruff check .
      - run: npm test
      - run: uv run --frozen python -m fearngreed.site --output dist
      - run: uv run --frozen python -c "from pathlib import Path; from fearngreed.security import scan_public_files; assert not scan_public_files(Path('.'))"
      - name: Commit validated derivatives
        shell: bash
        run: |
          if git diff --quiet -- data; then
            echo "No derived-data changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git diff --cached --check
          git commit -m "data: refresh fear and greed derivatives"
          git push
