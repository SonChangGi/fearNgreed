name: Capture same-day fast signal

on:
  schedule:
    # GitHub cron is best-effort. The local LaunchAgent is the time-sensitive path.
    - cron: "47 6 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: fearngreed-pages
  cancel-in-progress: false

jobs:
  capture:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: uv sync --locked
      - name: Capture authenticated preliminary close signal
        id: capture
        shell: bash
        env:
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
        run: |
          inside_capture_window() {
            local current_time
            current_time="$(TZ=Asia/Seoul date +%H%M)"
            (( 10#$current_time >= 1547 && 10#$current_time < 1600 ))
          }

          seconds_until_cutoff() {
            local hour minute second
            hour="$(TZ=Asia/Seoul date +%H)"
            minute="$(TZ=Asia/Seoul date +%M)"
            second="$(TZ=Asia/Seoul date +%S)"
            echo $((16 * 3600 - 10#$hour * 3600 - 10#$minute * 60 - 10#$second))
          }

          emit_result() {
            echo "changed=$1" >> "$GITHUB_OUTPUT"
            echo "outcome=$2" >> "$GITHUB_OUTPUT"
          }

          receipt_field() {
            uv run --frozen python -c \
              'import json, pathlib, sys; payload=json.loads(pathlib.Path(sys.argv[1]).read_text()); value=payload.get(sys.argv[2]); print("true" if value is True else "false" if value is False else value or "")' \
              "$receipt_file" "$1"
          }

          target_date="$(TZ=Asia/Seoul date +%F)"
          target_weekday="$(TZ=Asia/Seoul date +%u)"
          if (( target_weekday > 5 )); then
            emit_result false skipped_non_session
            echo "::notice title=Fast signal skipped::Korean weekend has no KRX session."
            exit 0
          fi
          if ! inside_capture_window; then
            emit_result false skipped_outside_window
            echo "::notice title=Fast signal skipped::Runner started outside 15:47-16:00 KST."
            exit 0
          fi

          missing_secrets=()
          [[ -n "$KRX_API_KEY" ]] || missing_secrets+=(KRX_API_KEY)
          [[ -n "$KRX_ID" ]] || missing_secrets+=(KRX_ID)
          [[ -n "$KRX_PW" ]] || missing_secrets+=(KRX_PW)
          if (( ${#missing_secrets[@]} )); then
            printf -v missing_names '%s, ' "${missing_secrets[@]}"
            echo "::error title=Missing required Actions secrets::Missing required secret names: ${missing_names%, }"
            exit 1
          fi

          umask 077
          receipt_file="$RUNNER_TEMP/fearngreed-live-signal-receipt.json"
          candidate_file="$RUNNER_TEMP/fearngreed-live-signal-candidate.json"
          trap 'rm -f "$receipt_file" "$candidate_file"' EXIT

          for attempt in 1 2 3 4; do
            if ! inside_capture_window; then
              emit_result false skipped_cutoff
              echo "::notice title=Fast signal skipped::16:00 KST cutoff reached before capture."
              exit 0
            fi

            : > "$receipt_file"
            rm -f "$candidate_file"
            set +e
            uv run --frozen python -m fearngreed.live_signal \
              --date "$target_date" \
              --output "$candidate_file" > "$receipt_file"
            capture_status=$?
            set -e

            if ! inside_capture_window; then
              emit_result false skipped_cutoff
              echo "::notice title=Fast signal skipped::Capture completed after the 16:00 KST cutoff."
              exit 0
            fi

            if (( capture_status == 0 )); then
              if [[ "$(receipt_field skipped)" == "true" ]]; then
                emit_result false skipped_confirmed
                cat "$receipt_file"
                exit 0
              fi
              if [[ ! -s "$candidate_file" ]]; then
                echo "::error title=Fast signal capture failed::Successful capture returned no candidate."
                exit 1
              fi
              mv "$candidate_file" data/live-signal.json
              uv run --frozen python -c "from pathlib import Path; from fearngreed.security import scan_public_files; assert not scan_public_files(Path('.'))"
              cat "$receipt_file"
              if git diff --quiet -- data/live-signal.json; then
                emit_result false unchanged
              else
                emit_result true success
              fi
              exit 0
            fi

            reason="$(receipt_field reason 2>/dev/null || true)"
            case "$reason" in
              live_kospi_session_unavailable|live_flow_session_unavailable|live_kospi_date_mismatch|live_flow_date_mismatch|live_observation_invalid|live_capture_window_closed)
                ;;
              *)
                echo "::error title=Fast signal capture failed::Authenticated capture failed with a non-transient pipeline error."
                exit 1
                ;;
            esac

            remaining="$(seconds_until_cutoff)"
            if (( attempt == 4 || remaining <= 180 )); then
              emit_result false skipped_not_ready
              echo "::notice title=Fast signal skipped::No KRX session or same-day inputs were not ready before cutoff."
              exit 0
            fi
            sleep 180
          done
      - name: Enforce fast-signal mutation boundary
        if: steps.capture.outputs.changed == 'true'
        shell: bash
        run: |
          unexpected=0
          while IFS= read -r path; do
            case "$path" in
              data/live-signal.json) ;;
              *)
                echo "Unexpected fast-signal mutation: $path"
                unexpected=1
                ;;
            esac
          done < <(git diff --name-only)
          [[ $unexpected -eq 0 ]]
      - if: steps.capture.outputs.changed == 'true'
        run: uv run --frozen pytest
      - if: steps.capture.outputs.changed == 'true'
        run: uv run --frozen ruff check .
      - if: steps.capture.outputs.changed == 'true'
        run: uv run --frozen ruff format --check .
      - if: steps.capture.outputs.changed == 'true'
        run: npm test
      - if: steps.capture.outputs.changed == 'true'
        run: uv run --frozen python -m fearngreed.verify
      - if: steps.capture.outputs.changed == 'true'
        run: uv run --frozen python -m fearngreed.site --output dist
      - name: Commit validated fast signal
        if: steps.capture.outputs.changed == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/live-signal.json
          git diff --cached --check
          git commit -m "data: capture same-day fear and greed signal"
          remote_head="$(git ls-remote origin refs/heads/main | cut -f1)"
          [[ "$remote_head" == "$(git rev-parse HEAD^)" ]]
          git push origin HEAD:main
      - if: steps.capture.outputs.changed == 'true'
        uses: actions/configure-pages@v5
      - if: steps.capture.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - name: Deploy validated fast signal
        if: steps.capture.outputs.changed == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Verify live public hashes
        if: steps.capture.outputs.changed == 'true'
        shell: bash
        run: |
          for attempt in {1..12}; do
            if uv run --frozen python -m fearngreed.verify --base-url "${{ steps.deployment.outputs.page_url }}"; then
              exit 0
            fi
            [[ $attempt -lt 12 ]] || exit 1
            sleep 5
          done
