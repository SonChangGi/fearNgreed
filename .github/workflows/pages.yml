name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: fearngreed-pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: uv sync --locked
      - run: uv run --frozen pytest
      - run: uv run --frozen ruff check .
      - run: uv run --frozen python -m fearngreed.verify
      - run: uv run --frozen ruff format --check .
      - run: npm test
      - run: uv run --frozen python -m fearngreed.site --output dist
      - run: uv run --frozen python -c "from pathlib import Path; from fearngreed.security import scan_public_files; assert not scan_public_files(Path('.'))"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Verify live public derivative hashes
        shell: bash
        run: |
          for attempt in {1..12}; do
            if uv run --frozen python -m fearngreed.verify --base-url "${{ steps.deployment.outputs.page_url }}"; then
              exit 0
            fi
            if [[ $attempt -eq 12 ]]; then
              exit 1
            fi
            sleep 5
          done
